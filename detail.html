    <nav class="flex mx-3 max-w-full mt-4">
      <div class="Home basis-2/3">

    <div class="body h-screen mx-16 mt-24 lg:flex lg:gap-16" id="body">
      <div class="kiri lg:w-1/2 flex-1">
        <h2
          class="title text-4xl font-bold text-orange-600 sm:text-5xl md:text-6xl lg:text-7xl"
        ></h2>
        <img class="imagekiri my-7 w-full lg:hidden" src="" alt="" />
        <p class="desc font-semibold text-slate-800 text-justify lg: mt-5"></p>
        <div class="backtoHome mt-7">

            class="p-4 bg-orange-400 rounded-lg text-white text-lg"
            href="index.html"
            >Back to Home</a
          >
        </div>
      </div>
      <div class="kanan invisible lg:visible w-1/2">
        <img class="imagekanan w-full object-cover" src="" alt="" />
      </div>
    </div>

    <script>
      var body = document.querySelector("#body");
      var tempMoveJSON = localStorage.getItem("i");
      var tempMove = JSON.parse(tempMoveJSON);
      var tempImg = tempMove.image;
      var tempName = tempMove.name;
      var tempDesc = tempMove.desc;
      var title = document.querySelector(".title");
      var imagekiri = document.querySelector(".imagekiri");
      var imagekanan = document.querySelector(".imagekanan");
      var desc = document.querySelector(".desc");
      title.innerHTML = tempName;
      imagekanan.src = tempImg;
      imagekiri.src = tempImg;
      desc.innerHTML = tempDesc;
    </script>
